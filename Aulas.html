<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horário de Aulas - LFA</title>
    <link rel="stylesheet" href="css/styleAulas.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>📅 Horário de Aulas</h1>
                <div class="header-nav">
                    <a href="Perfil.html" class="nav-link">👤 Perfil</a>
                    <a href="Mensalidades.html" class="nav-link">💰 Mensalidades</a>
                </div>
                <div class="user-info">
                    <span id="nomeUtilizador">Carregando...</span>
                    <button id="btnLogout" class="btn-logout">Sair</button>
                </div>
            </div>
        </header>

        <main>
            <!-- Instruções -->
            <div class="instrucoes">
                <h3>🎯 Como funciona:</h3>
                <p>Clique nos <strong>blocos verdes</strong> para se inscrever em aulas. Clique novamente para cancelar a inscrição.</p>
            </div>

            <!-- Calendário Semanal -->
            <div class="calendario-wrapper">
                <div id="calendario" class="calendario">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Minhas Inscrições -->
            <div class="minhas-inscricoes-container">
                <h2>✅ Minhas Inscrições</h2>
                <div id="minhasInscricoesList" class="inscricoes-list">
                    <!-- Será preenchido via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Confirmação -->
    <div id="modalConfirm" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirmar</h3>
            <div id="modalDetails" class="modal-details"></div>
            <p id="modalMessage">Mensagem</p>
            <div class="modal-buttons">
                <button id="btnConfirmar" class="btn-confirmar">Confirmar</button>
                <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script/aulas.js"></script>
</body>
</html>
